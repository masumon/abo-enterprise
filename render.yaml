services:
  - type: web
    name: abo-enterprise-api
    runtime: python
    plan: starter
    rootDir: backend
    buildCommand: pip install -r requirements.txt && alembic upgrade head
    startCommand: uvicorn app.main:app --host 0.0.0.0 --port $PORT --workers 1
    healthCheckPath: /health
    autoDeploy: true
    envVars:
      - key: APP_ENV
        value: production
      - key: STARTUP_BOOTSTRAP_ENABLED
        value: "false"
      - key: ALLOWED_ORIGINS
        value: "https://aboenterprise.com,https://www.aboenterprise.com,https://aboenterprise.vercel.app,https://abo-enterprise.vercel.app,https://enterprise.vercel.app,https://abo-enterprise-git-main.vercel.app"
      - key: DATABASE_URL
        sync: false
      - key: SECRET_KEY
        generateValue: true
      - key: ADMIN_EMAIL
        sync: false
      - key: ADMIN_PASSWORD
        sync: false
      - key: ADMIN_NAME
        value: Admin
      - key: JWT_ALGORITHM
        value: HS256
      - key: ACCESS_TOKEN_EXPIRE_MINUTES
        value: "1440"
      - key: SMTP_HOST
        value: smtp.sendgrid.net
      - key: SMTP_PORT
        value: "587"
      - key: SMTP_USER
        value: apikey
      - key: SMTP_PASSWORD
        sync: false
      - key: SMTP_FROM
        value: noreply@aboenterprise.com
      - key: SMTP_TLS
        value: "true"
      - key: EMAIL_SENDER_NAME
        value: ABO Enterprise
      - key: ADMIN_NOTIFY_EMAIL
        sync: false
      - key: BUSINESS_EMAIL
        sync: false
      - key: WHATSAPP_NUMBER
        sync: false
      - key: CLOUDINARY_CLOUD_NAME
        sync: false
      - key: CLOUDINARY_API_KEY
        sync: false
      - key: CLOUDINARY_API_SECRET
        sync: false
      - key: BKASH_APP_KEY
        sync: false
      - key: BKASH_APP_SECRET
        sync: false
      - key: BKASH_USERNAME
        sync: false
      - key: BKASH_PASSWORD
        sync: false
      - key: BKASH_CALLBACK_URL
        sync: false
      - key: NAGAD_MERCHANT_ID
        sync: false
      - key: NAGAD_MERCHANT_KEY
        sync: false
      - key: NAGAD_MERCHANT_NUMBER
        sync: false
      - key: NAGAD_CALLBACK_URL
        sync: false
      - key: GA4_PROPERTY_ID
        sync: false
      - key: GA4_CLIENT_EMAIL
        sync: false
      - key: GA4_PRIVATE_KEY
        sync: false
