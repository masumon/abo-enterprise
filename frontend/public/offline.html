<!DOCTYPE html>
<html lang="bn">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <meta name="theme-color" content="#2563eb" />
    <title>অফলাইন - ABO Enterprise</title>
    <style>
      * {
        margin: 0;
        padding: 0;
        box-sizing: border-box;
      }

      body {
        font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Oxygen, Ubuntu, Cantarell, sans-serif;
        background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
        min-height: 100vh;
        display: flex;
        align-items: center;
        justify-content: center;
        padding: 20px;
      }

      .offline-container {
        background: white;
        border-radius: 16px;
        box-shadow: 0 20px 60px rgba(0, 0, 0, 0.3);
        padding: 40px 20px;
        max-width: 500px;
        text-align: center;
      }

      .offline-icon {
        width: 80px;
        height: 80px;
        margin: 0 auto 20px;
        background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
        border-radius: 50%;
        display: flex;
        align-items: center;
        justify-content: center;
        font-size: 40px;
      }

      h1 {
        color: #1f2937;
        font-size: 28px;
        margin-bottom: 10px;
        font-weight: 700;
      }

      .subtitle {
        color: #6b7280;
        font-size: 16px;
        margin-bottom: 30px;
        line-height: 1.6;
      }

      .offline-features {
        background: #f3f4f6;
        border-radius: 12px;
        padding: 20px;
        margin-bottom: 30px;
        text-align: left;
      }

      .feature-item {
        display: flex;
        align-items: center;
        padding: 10px 0;
        color: #374151;
        font-size: 14px;
      }

      .feature-icon {
        width: 24px;
        height: 24px;
        background: #10b981;
        color: white;
        border-radius: 50%;
        display: flex;
        align-items: center;
        justify-content: center;
        margin-right: 12px;
        font-weight: bold;
        flex-shrink: 0;
      }

      .actions {
        display: flex;
        gap: 10px;
        flex-direction: column;
      }

      button {
        padding: 12px 24px;
        border: none;
        border-radius: 8px;
        font-size: 16px;
        font-weight: 600;
        cursor: pointer;
        transition: all 0.3s ease;
      }

      .btn-primary {
        background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
        color: white;
      }

      .btn-primary:hover {
        transform: translateY(-2px);
        box-shadow: 0 10px 20px rgba(102, 126, 234, 0.3);
      }

      .btn-secondary {
        background: #e5e7eb;
        color: #374151;
      }

      .btn-secondary:hover {
        background: #d1d5db;
      }

      .status {
        font-size: 12px;
        color: #9ca3af;
        margin-top: 20px;
      }

      .spinner {
        display: inline-block;
        width: 12px;
        height: 12px;
        background: #667eea;
        border-radius: 50%;
        animation: pulse 1.5s infinite;
        margin-right: 6px;
      }

      @keyframes pulse {
        0%, 100% {
          opacity: 1;
        }
        50% {
          opacity: 0.5;
        }
      }

      @media (max-width: 480px) {
        .offline-container {
          padding: 30px 15px;
        }

        h1 {
          font-size: 24px;
        }

        .offline-icon {
          width: 60px;
          height: 60px;
          font-size: 30px;
        }
      }
    </style>
  </head>
  <body>
    <div class="offline-container">
      <div class="offline-icon">📡</div>
      <h1>আপনি অফলাইন</h1>
      <p class="subtitle">
        আপনার ইন্টারনেট সংযোগ বিচ্ছিন্ন হয়েছে। কিছু বৈশিষ্ট্য সীমিত থাকতে পারে।
      </p>

      <div class="offline-features">
        <p style="margin-bottom: 12px; color: #111827; font-weight: 600; font-size: 14px;">
          অফলাইনে উপলব্ধ:
        </p>
        <div class="feature-item">
          <div class="feature-icon">✓</div>
          <span>আগে দেখা সেবা ব্রাউজ করুন</span>
        </div>
        <div class="feature-item">
          <div class="feature-icon">✓</div>
          <span>আপনার বুকিং হিস্টরি দেখুন</span>
        </div>
        <div class="feature-item">
          <div class="feature-icon">✓</div>
          <span>শপিং কার্টে আইটেম যোগ করুন</span>
        </div>
        <div class="feature-item">
          <div class="feature-icon">✓</div>
          <span>সংযোগ ফিরলে স্বয়ংক্রিয় সিঙ্ক</span>
        </div>
      </div>

      <div class="actions">
        <button class="btn-primary" onclick="checkConnection()">
          সংযোগ পরীক্ষা করুন
        </button>
        <button class="btn-secondary" onclick="goHome()">
          হোমপেজে ফিরুন
        </button>
      </div>

      <div class="status">
        <span class="spinner"></span>
        সংযোগ অপেক্ষা করা হচ্ছে...
      </div>
    </div>

    <script>
      window.addEventListener("online", () => {
        window.location.href = "/";
      });

      function checkConnection() {
        fetch("/manifest.json")
          .then(() => {
            window.location.href = "/";
          })
          .catch(() => {
            alert("এখনও অফলাইন আছেন। আপনার ইন্টারনেট সংযোগ পরীক্ষা করুন।");
          });
      }

      function goHome() {
        window.location.href = "/";
      }
    </script>
  </body>
</html>
