<!DOCTYPE html>
<html lang="en" class="dark">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <meta name="theme-color" content="#0f172a" />
    <meta name="description" content="Aegis AI X - Enterprise AI Orchestration Platform" />
    <meta name="robots" content="noindex, nofollow" />

    <!-- Preconnect to font CDN -->
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800&family=JetBrains+Mono:wght@400;500;600&display=swap"
      rel="stylesheet"
    />

    <link rel="icon" href="%PUBLIC_URL%/favicon.ico" />
    <link rel="apple-touch-icon" href="%PUBLIC_URL%/logo192.png" />

    <title>Aegis AI X | Dashboard</title>

    <style>
      /* Critical CSS for initial load */
      *,
      *::before,
      *::after {
        box-sizing: border-box;
      }

      body {
        margin: 0;
        padding: 0;
        font-family: "Inter", system-ui, -apple-system, sans-serif;
        -webkit-font-smoothing: antialiased;
        -moz-osx-font-smoothing: grayscale;
        background-color: #0f172a;
        color: #e2e8f0;
      }

      #loading-screen {
        display: flex;
        flex-direction: column;
        align-items: center;
        justify-content: center;
        height: 100vh;
        background-color: #0f172a;
      }

      #loading-screen .logo-text {
        font-size: 2rem;
        font-weight: 700;
        color: #818cf8;
        margin-bottom: 1.5rem;
        letter-spacing: -0.025em;
      }

      #loading-screen .spinner {
        width: 40px;
        height: 40px;
        border: 3px solid #1e293b;
        border-top-color: #6366f1;
        border-radius: 50%;
        animation: spin 0.8s linear infinite;
      }

      @keyframes spin {
        to {
          transform: rotate(360deg);
        }
      }
    </style>
  </head>
  <body>
    <noscript>You need to enable JavaScript to run the Aegis AI X Dashboard.</noscript>
    <div id="root">
      <div id="loading-screen">
        <div class="logo-text">Aegis AI X</div>
        <div class="spinner"></div>
      </div>
    </div>
  </body>
</html>
