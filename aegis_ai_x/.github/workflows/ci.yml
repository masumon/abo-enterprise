name: CI

on:
  push:
    branches: [main, develop]
  pull_request:
    branches: [main]

env:
  PYTHON_VERSION: "3.11"
  NODE_VERSION: "20"

jobs:
  lint:
    name: Lint & Type Check
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: ${{ env.PYTHON_VERSION }}
      - name: Install dependencies
        run: |
          cd aegis_ai_x
          pip install -e ".[dev]"
      - name: Run Ruff linter
        run: ruff check aegis_ai_x/
      - name: Run MyPy type check
        run: mypy aegis_ai_x/ --ignore-missing-imports

  test-backend:
    name: Backend Tests
    runs-on: ubuntu-latest
    services:
      postgres:
        image: postgres:16-alpine
        env:
          POSTGRES_DB: sumonix_ai_test
          POSTGRES_USER: sumonix
          POSTGRES_PASSWORD: test_password
        ports:
          - 5432:5432
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
      redis:
        image: redis:7-alpine
        ports:
          - 6379:6379
        options: >-
          --health-cmd "redis-cli ping"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: ${{ env.PYTHON_VERSION }}
      - name: Install dependencies
        run: |
          cd aegis_ai_x
          pip install -e ".[dev]"
      - name: Run tests with coverage
        env:
          POSTGRES_HOST: localhost
          POSTGRES_DB: sumonix_ai_test
          POSTGRES_USER: sumonix
          POSTGRES_PASSWORD: test_password
          REDIS_HOST: localhost
          REDIS_PASSWORD: ""
          APP_ENV: test
        run: |
          cd aegis_ai_x
          python -m pytest tests/ -v --cov=. --cov-report=xml
      - name: Upload coverage
        uses: codecov/codecov-action@v4
        with:
          file: aegis_ai_x/coverage.xml
          fail_ci_if_error: false

  test-frontend:
    name: Frontend Build & Lint
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: npm
          cache-dependency-path: aegis_ai_x/frontend/dashboard/package-lock.json
      - name: Install dependencies
        run: |
          cd aegis_ai_x/frontend/dashboard
          npm ci --silent
      - name: Type check
        run: |
          cd aegis_ai_x/frontend/dashboard
          npx tsc --noEmit || true
      - name: Build
        run: |
          cd aegis_ai_x/frontend/dashboard
          npm run build
        env:
          CI: true

  security-scan:
    name: Security Scan
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: ${{ env.PYTHON_VERSION }}
      - name: Install safety
        run: pip install safety bandit
      - name: Check dependencies for vulnerabilities
        run: |
          cd aegis_ai_x
          pip install -e . 2>/dev/null || true
          safety check --output text || true
      - name: Run Bandit security linter
        run: |
          bandit -r aegis_ai_x/ -ll --skip B101,B601 || true

  build-docker:
    name: Build Docker Images
    runs-on: ubuntu-latest
    needs: [lint, test-backend, test-frontend]
    strategy:
      matrix:
        service: [api_gateway, supervisor, agents, execution, approval, auth, analytics]
    steps:
      - uses: actions/checkout@v4
      - name: Build ${{ matrix.service }}
        run: |
          cd aegis_ai_x
          docker build -f services/${{ matrix.service }}/Dockerfile -t sumonix-${{ matrix.service }}:test .

  build-frontend:
    name: Build Frontend Image
    runs-on: ubuntu-latest
    needs: [lint, test-frontend]
    steps:
      - uses: actions/checkout@v4
      - name: Build Dashboard
        run: |
          cd aegis_ai_x/frontend/dashboard
          docker build -t sumonix-dashboard:test .
