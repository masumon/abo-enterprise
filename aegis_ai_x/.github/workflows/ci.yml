name: CI

on:
  push:
    branches: [main, develop]
  pull_request:
    branches: [main]

jobs:
  lint:
    name: Lint & Type Check
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
      - name: Install dependencies
        run: |
          cd aegis_ai_x
          pip install -e ".[dev]"
      - name: Run Ruff linter
        run: ruff check aegis_ai_x/
      - name: Run MyPy type check
        run: mypy aegis_ai_x/ --ignore-missing-imports

  test:
    name: Tests
    runs-on: ubuntu-latest
    services:
      postgres:
        image: postgres:16-alpine
        env:
          POSTGRES_DB: aegis_ai_test
          POSTGRES_USER: aegis
          POSTGRES_PASSWORD: test_password
        ports:
          - 5432:5432
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
      redis:
        image: redis:7-alpine
        ports:
          - 6379:6379
        options: >-
          --health-cmd "redis-cli ping"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
      - name: Install dependencies
        run: |
          cd aegis_ai_x
          pip install -e ".[dev]"
      - name: Run tests with coverage
        env:
          POSTGRES_HOST: localhost
          POSTGRES_DB: aegis_ai_test
          POSTGRES_USER: aegis
          POSTGRES_PASSWORD: test_password
          REDIS_HOST: localhost
          APP_ENV: test
        run: |
          cd aegis_ai_x
          python -m pytest tests/ -v --cov=. --cov-report=xml
      - name: Upload coverage
        uses: codecov/codecov-action@v3
        with:
          file: aegis_ai_x/coverage.xml

  build:
    name: Build Docker Images
    runs-on: ubuntu-latest
    needs: [lint, test]
    strategy:
      matrix:
        service: [api_gateway, supervisor, agents, execution, approval, auth, analytics]
    steps:
      - uses: actions/checkout@v4
      - name: Build ${{ matrix.service }}
        run: |
          cd aegis_ai_x
          docker build -f services/${{ matrix.service }}/Dockerfile -t aegis-${{ matrix.service }}:test .
