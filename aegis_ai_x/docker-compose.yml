services:
  # ─── API Gateway ───────────────────────────
  api-gateway:
    build:
      context: .
      dockerfile: services/api_gateway/Dockerfile
    ports:
      - "${API_GATEWAY_PORT:-8000}:8000"
    environment:
      - APP_ENV=${APP_ENV:-development}
      - APP_NAME=SUMONIX AI
      - POSTGRES_HOST=postgres
      - POSTGRES_DB=${POSTGRES_DB:-sumonix_ai}
      - POSTGRES_USER=${POSTGRES_USER:-sumonix}
      - POSTGRES_PASSWORD=${POSTGRES_PASSWORD:-sumonix_dev}
      - REDIS_HOST=redis
      - REDIS_PASSWORD=${REDIS_PASSWORD:-sumonix_dev}
      - JWT_SECRET_KEY=${JWT_SECRET_KEY}
      - OPENAI_API_KEY=${OPENAI_API_KEY}
      - ANTHROPIC_API_KEY=${ANTHROPIC_API_KEY}
      - GOOGLE_AI_API_KEY=${GOOGLE_AI_API_KEY}
      - STRIPE_SECRET_KEY=${STRIPE_SECRET_KEY}
      - STRIPE_WEBHOOK_SECRET=${STRIPE_WEBHOOK_SECRET}
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8000/health"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - sumonix-net
    restart: unless-stopped

  # ─── Supervisor Service ────────────────────
  supervisor:
    build:
      context: .
      dockerfile: services/supervisor/Dockerfile
    environment:
      - APP_ENV=${APP_ENV:-development}
      - REDIS_HOST=redis
      - REDIS_PASSWORD=${REDIS_PASSWORD:-sumonix_dev}
      - POSTGRES_HOST=postgres
      - POSTGRES_DB=${POSTGRES_DB:-sumonix_ai}
      - POSTGRES_USER=${POSTGRES_USER:-sumonix}
      - POSTGRES_PASSWORD=${POSTGRES_PASSWORD:-sumonix_dev}
    depends_on:
      - redis
      - postgres
    networks:
      - sumonix-net
    restart: unless-stopped

  # ─── Agent Service ─────────────────────────
  agents:
    build:
      context: .
      dockerfile: services/agents/Dockerfile
    environment:
      - APP_ENV=${APP_ENV:-development}
      - OPENAI_API_KEY=${OPENAI_API_KEY}
      - ANTHROPIC_API_KEY=${ANTHROPIC_API_KEY}
      - GOOGLE_AI_API_KEY=${GOOGLE_AI_API_KEY}
      - QDRANT_HOST=qdrant
      - REDIS_HOST=redis
      - REDIS_PASSWORD=${REDIS_PASSWORD:-sumonix_dev}
    depends_on:
      - redis
      - qdrant
    networks:
      - sumonix-net
    restart: unless-stopped

  # ─── Execution Service ─────────────────────
  execution:
    build:
      context: .
      dockerfile: services/execution/Dockerfile
    privileged: true
    volumes:
      - /var/run/docker.sock:/var/run/docker.sock
    environment:
      - APP_ENV=${APP_ENV:-development}
      - REDIS_HOST=redis
      - REDIS_PASSWORD=${REDIS_PASSWORD:-sumonix_dev}
    depends_on:
      - redis
    networks:
      - sumonix-net
    restart: unless-stopped

  # ─── Approval Service ─────────────────────
  approval:
    build:
      context: .
      dockerfile: services/approval/Dockerfile
    environment:
      - APP_ENV=${APP_ENV:-development}
      - POSTGRES_HOST=postgres
      - POSTGRES_DB=${POSTGRES_DB:-sumonix_ai}
      - POSTGRES_USER=${POSTGRES_USER:-sumonix}
      - POSTGRES_PASSWORD=${POSTGRES_PASSWORD:-sumonix_dev}
      - REDIS_HOST=redis
      - REDIS_PASSWORD=${REDIS_PASSWORD:-sumonix_dev}
    depends_on:
      - postgres
      - redis
    networks:
      - sumonix-net
    restart: unless-stopped

  # ─── Auth Service ──────────────────────────
  auth:
    build:
      context: .
      dockerfile: services/auth/Dockerfile
    environment:
      - APP_ENV=${APP_ENV:-development}
      - POSTGRES_HOST=postgres
      - POSTGRES_DB=${POSTGRES_DB:-sumonix_ai}
      - POSTGRES_USER=${POSTGRES_USER:-sumonix}
      - POSTGRES_PASSWORD=${POSTGRES_PASSWORD:-sumonix_dev}
      - JWT_SECRET_KEY=${JWT_SECRET_KEY}
      - OAUTH_GITHUB_CLIENT_ID=${OAUTH_GITHUB_CLIENT_ID}
      - OAUTH_GITHUB_CLIENT_SECRET=${OAUTH_GITHUB_CLIENT_SECRET}
      - OAUTH_GOOGLE_CLIENT_ID=${OAUTH_GOOGLE_CLIENT_ID}
      - OAUTH_GOOGLE_CLIENT_SECRET=${OAUTH_GOOGLE_CLIENT_SECRET}
    depends_on:
      postgres:
        condition: service_healthy
    networks:
      - sumonix-net
    restart: unless-stopped

  # ─── Analytics Service ─────────────────────
  analytics:
    build:
      context: .
      dockerfile: services/analytics/Dockerfile
    environment:
      - APP_ENV=${APP_ENV:-development}
      - POSTGRES_HOST=postgres
      - POSTGRES_DB=${POSTGRES_DB:-sumonix_ai}
      - POSTGRES_USER=${POSTGRES_USER:-sumonix}
      - POSTGRES_PASSWORD=${POSTGRES_PASSWORD:-sumonix_dev}
      - MONGO_HOST=mongodb
    depends_on:
      - postgres
      - mongodb
    networks:
      - sumonix-net
    restart: unless-stopped

  # ─── Frontend Dashboard ────────────────────
  dashboard:
    build:
      context: ./frontend/dashboard
      dockerfile: Dockerfile
    ports:
      - "3000:80"
    environment:
      - REACT_APP_API_URL=http://localhost:${API_GATEWAY_PORT:-8000}
    depends_on:
      api-gateway:
        condition: service_healthy
    networks:
      - sumonix-net
    restart: unless-stopped

  # ─── Infrastructure: PostgreSQL ────────────
  postgres:
    image: postgres:16-alpine
    environment:
      POSTGRES_DB: ${POSTGRES_DB:-sumonix_ai}
      POSTGRES_USER: ${POSTGRES_USER:-sumonix}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-sumonix_dev}
    ports:
      - "${POSTGRES_PORT:-5432}:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./database/migrations/postgresql:/docker-entrypoint-initdb.d
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-sumonix}"]
      interval: 5s
      timeout: 5s
      retries: 5
    networks:
      - sumonix-net
    restart: unless-stopped

  # ─── Infrastructure: MongoDB ───────────────
  mongodb:
    image: mongo:7
    environment:
      MONGO_INITDB_ROOT_USERNAME: ${MONGO_USER:-sumonix}
      MONGO_INITDB_ROOT_PASSWORD: ${MONGO_PASSWORD:-sumonix_dev}
    ports:
      - "${MONGO_PORT:-27017}:27017"
    volumes:
      - mongo_data:/data/db
    networks:
      - sumonix-net
    restart: unless-stopped

  # ─── Infrastructure: Redis ─────────────────
  redis:
    image: redis:7-alpine
    command: redis-server --requirepass ${REDIS_PASSWORD:-sumonix_dev}
    ports:
      - "${REDIS_PORT:-6379}:6379"
    healthcheck:
      test: ["CMD", "redis-cli", "-a", "${REDIS_PASSWORD:-sumonix_dev}", "ping"]
      interval: 5s
      timeout: 5s
      retries: 5
    volumes:
      - redis_data:/data
    networks:
      - sumonix-net
    restart: unless-stopped

  # ─── Infrastructure: Qdrant ────────────────
  qdrant:
    image: qdrant/qdrant:latest
    ports:
      - "${QDRANT_PORT:-6333}:6333"
    volumes:
      - qdrant_data:/qdrant/storage
    networks:
      - sumonix-net
    restart: unless-stopped

  # ─── Monitoring: Prometheus ────────────────
  prometheus:
    image: prom/prometheus:latest
    ports:
      - "${PROMETHEUS_PORT:-9090}:9090"
    volumes:
      - ./infrastructure/kubernetes/configmaps/prometheus.yml:/etc/prometheus/prometheus.yml
      - prometheus_data:/prometheus
    networks:
      - sumonix-net
    restart: unless-stopped

  # ─── Monitoring: Grafana ───────────────────
  grafana:
    image: grafana/grafana:latest
    ports:
      - "${GRAFANA_PORT:-3001}:3000"
    environment:
      - GF_SECURITY_ADMIN_PASSWORD=${GF_ADMIN_PASSWORD:-admin}
    volumes:
      - grafana_data:/var/lib/grafana
    depends_on:
      - prometheus
    networks:
      - sumonix-net
    restart: unless-stopped

volumes:
  postgres_data:
  mongo_data:
  redis_data:
  qdrant_data:
  prometheus_data:
  grafana_data:

networks:
  sumonix-net:
    driver: bridge
