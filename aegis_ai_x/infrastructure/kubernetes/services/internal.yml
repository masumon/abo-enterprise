# Internal ClusterIP services for microservices communication
---
apiVersion: v1
kind: Service
metadata:
  name: supervisor
  namespace: sumonix-ai
spec:
  type: ClusterIP
  ports:
    - port: 8001
      targetPort: 8001
  selector:
    app: sumonix-ai
    component: supervisor
---
apiVersion: v1
kind: Service
metadata:
  name: agents
  namespace: sumonix-ai
spec:
  type: ClusterIP
  ports:
    - port: 8002
      targetPort: 8002
  selector:
    app: sumonix-ai
    component: agents
---
apiVersion: v1
kind: Service
metadata:
  name: execution
  namespace: sumonix-ai
spec:
  type: ClusterIP
  ports:
    - port: 8004
      targetPort: 8004
  selector:
    app: sumonix-ai
    component: execution
---
apiVersion: v1
kind: Service
metadata:
  name: approval
  namespace: sumonix-ai
spec:
  type: ClusterIP
  ports:
    - port: 8005
      targetPort: 8005
  selector:
    app: sumonix-ai
    component: approval
---
apiVersion: v1
kind: Service
metadata:
  name: analytics
  namespace: sumonix-ai
spec:
  type: ClusterIP
  ports:
    - port: 8006
      targetPort: 8006
  selector:
    app: sumonix-ai
    component: analytics
---
apiVersion: v1
kind: Service
metadata:
  name: auth
  namespace: sumonix-ai
spec:
  type: ClusterIP
  ports:
    - port: 8003
      targetPort: 8003
  selector:
    app: sumonix-ai
    component: auth
