apiVersion: apps/v1
kind: Deployment
metadata:
  name: supervisor
  namespace: sumonix-ai
  labels:
    app: sumonix-ai
    component: supervisor
spec:
  replicas: 1
  selector:
    matchLabels:
      app: sumonix-ai
      component: supervisor
  template:
    metadata:
      labels:
        app: sumonix-ai
        component: supervisor
    spec:
      containers:
        - name: supervisor
          image: ghcr.io/sumonix-ai/supervisor:latest
          ports:
            - containerPort: 8001
          envFrom:
            - secretRef:
                name: sumonix-secrets
          resources:
            requests:
              memory: "256Mi"
              cpu: "250m"
            limits:
              memory: "512Mi"
              cpu: "500m"
          livenessProbe:
            httpGet:
              path: /supervisor/health
              port: 8001
            initialDelaySeconds: 15
            periodSeconds: 10
