apiVersion: apps/v1
kind: Deployment
metadata:
  name: api-gateway
  namespace: sumonix-ai
  labels:
    app: sumonix-ai
    component: api-gateway
spec:
  replicas: 2
  selector:
    matchLabels:
      app: sumonix-ai
      component: api-gateway
  template:
    metadata:
      labels:
        app: sumonix-ai
        component: api-gateway
    spec:
      containers:
        - name: api-gateway
          image: ghcr.io/sumonix-ai/api-gateway:latest
          ports:
            - containerPort: 8000
          env:
            - name: APP_ENV
              value: "production"
            - name: POSTGRES_HOST
              valueFrom:
                secretKeyRef:
                  name: sumonix-secrets
                  key: POSTGRES_HOST
            - name: POSTGRES_PASSWORD
              valueFrom:
                secretKeyRef:
                  name: sumonix-secrets
                  key: POSTGRES_PASSWORD
            - name: JWT_SECRET_KEY
              valueFrom:
                secretKeyRef:
                  name: sumonix-secrets
                  key: JWT_SECRET_KEY
            - name: REDIS_HOST
              valueFrom:
                secretKeyRef:
                  name: sumonix-secrets
                  key: REDIS_HOST
          resources:
            requests:
              memory: "256Mi"
              cpu: "250m"
            limits:
              memory: "1Gi"
              cpu: "1000m"
          livenessProbe:
            httpGet:
              path: /health/live
              port: 8000
            initialDelaySeconds: 15
            periodSeconds: 10
          readinessProbe:
            httpGet:
              path: /health/ready
              port: 8000
            initialDelaySeconds: 5
            periodSeconds: 5
---
apiVersion: autoscaling/v2
kind: HorizontalPodAutoscaler
metadata:
  name: api-gateway-hpa
  namespace: sumonix-ai
spec:
  scaleTargetRef:
    apiVersion: apps/v1
    kind: Deployment
    name: api-gateway
  minReplicas: 2
  maxReplicas: 10
  metrics:
    - type: Resource
      resource:
        name: cpu
        target:
          type: Utilization
          averageUtilization: 70
    - type: Resource
      resource:
        name: memory
        target:
          type: Utilization
          averageUtilization: 80
