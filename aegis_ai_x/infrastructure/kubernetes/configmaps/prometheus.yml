global:
  scrape_interval: 15s
  evaluation_interval: 15s

scrape_configs:
  - job_name: "api-gateway"
    static_configs:
      - targets: ["api-gateway:8000"]
    metrics_path: /metrics

  - job_name: "supervisor"
    static_configs:
      - targets: ["supervisor:8001"]
    metrics_path: /metrics

  - job_name: "agents"
    static_configs:
      - targets: ["agents:8002"]
    metrics_path: /metrics

  - job_name: "auth"
    static_configs:
      - targets: ["auth:8003"]
    metrics_path: /metrics

  - job_name: "execution"
    static_configs:
      - targets: ["execution:8004"]
    metrics_path: /metrics

  - job_name: "approval"
    static_configs:
      - targets: ["approval:8005"]
    metrics_path: /metrics

  - job_name: "analytics"
    static_configs:
      - targets: ["analytics:8006"]
    metrics_path: /metrics

  - job_name: "prometheus"
    static_configs:
      - targets: ["localhost:9090"]
