# =============================================================================
# SUMONIX AI - Production Docker Compose
# =============================================================================
# Usage: docker compose -f infrastructure/docker-compose/production.yml up -d
#
# Features:
#   - Production-grade resource limits and reservations
#   - Health checks with appropriate intervals on all services
#   - Multiple replicas for critical services
#   - Structured JSON logging
#   - Security hardening (read-only root fs, no new privileges)
#   - Proper restart policies
# =============================================================================

version: "3.9"

x-common-prod-env: &common-prod-env
  APP_ENV: production
  LOG_LEVEL: WARNING
  LOG_FORMAT: json
  PYTHONDONTWRITEBYTECODE: "1"
  PYTHONUNBUFFERED: "1"

x-common-healthcheck: &common-healthcheck
  interval: 30s
  timeout: 10s
  retries: 5
  start_period: 60s

x-common-deploy: &common-deploy
  restart_policy:
    condition: on-failure
    delay: 10s
    max_attempts: 5
    window: 180s
  update_config:
    parallelism: 1
    delay: 30s
    failure_action: rollback
    order: start-first
  rollback_config:
    parallelism: 1
    delay: 10s

x-common-logging: &common-logging
  driver: json-file
  options:
    max-size: "100m"
    max-file: "10"
    tag: "{{.Name}}/{{.ID}}"

x-common-security: &common-security
  security_opt:
    - no-new-privileges:true
  read_only: true
  tmpfs:
    - /tmp:size=100M

services:
  # ─── API Gateway ─────────────────────────────────────────────────────────────
  api-gateway:
    image: ${REGISTRY}/api-gateway:${IMAGE_TAG}
    ports:
      - target: 8000
        published: ${API_GATEWAY_PORT:-8000}
        protocol: tcp
        mode: host
    environment:
      <<: *common-prod-env
      POSTGRES_HOST: postgres
      POSTGRES_PORT: "5432"
      POSTGRES_DB: ${POSTGRES_DB}
      POSTGRES_USER: ${POSTGRES_USER}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
      REDIS_HOST: redis
      REDIS_PORT: "6379"
      REDIS_PASSWORD: ${REDIS_PASSWORD}
      JWT_SECRET_KEY: ${JWT_SECRET_KEY}
      CORS_ALLOWED_ORIGINS: ${CORS_ALLOWED_ORIGINS}
      RATE_LIMIT_ENABLED: "true"
      RATE_LIMIT_DEFAULT: "100/minute"
    deploy:
      <<: *common-deploy
      replicas: 3
      resources:
        limits:
          cpus: "2.0"
          memory: 2048M
        reservations:
          cpus: "0.5"
          memory: 512M
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8000/health"]
      <<: *common-healthcheck
    <<: *common-security
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    networks:
      - sumonix-net
    logging: *common-logging

  # ─── Supervisor Service ──────────────────────────────────────────────────────
  supervisor:
    image: ${REGISTRY}/supervisor:${IMAGE_TAG}
    environment:
      <<: *common-prod-env
      REDIS_HOST: redis
      REDIS_PORT: "6379"
      REDIS_PASSWORD: ${REDIS_PASSWORD}
      POSTGRES_HOST: postgres
      POSTGRES_PORT: "5432"
      POSTGRES_DB: ${POSTGRES_DB}
      POSTGRES_USER: ${POSTGRES_USER}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
    deploy:
      <<: *common-deploy
      replicas: 2
      resources:
        limits:
          cpus: "1.0"
          memory: 1024M
        reservations:
          cpus: "0.25"
          memory: 256M
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8010/health"]
      <<: *common-healthcheck
    <<: *common-security
    depends_on:
      - redis
      - postgres
    networks:
      - sumonix-net
    logging: *common-logging

  # ─── Agent Service ───────────────────────────────────────────────────────────
  agents:
    image: ${REGISTRY}/agents:${IMAGE_TAG}
    environment:
      <<: *common-prod-env
      OPENAI_API_KEY: ${OPENAI_API_KEY}
      ANTHROPIC_API_KEY: ${ANTHROPIC_API_KEY}
      GOOGLE_AI_API_KEY: ${GOOGLE_AI_API_KEY}
      QDRANT_HOST: qdrant
      QDRANT_PORT: "6333"
      REDIS_HOST: redis
      REDIS_PORT: "6379"
      REDIS_PASSWORD: ${REDIS_PASSWORD}
      MAX_CONCURRENT_AGENTS: "50"
      AGENT_TIMEOUT_SECONDS: "300"
    deploy:
      <<: *common-deploy
      replicas: 3
      resources:
        limits:
          cpus: "2.0"
          memory: 4096M
        reservations:
          cpus: "0.5"
          memory: 1024M
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8020/health"]
      <<: *common-healthcheck
    <<: *common-security
    depends_on:
      - redis
      - qdrant
    networks:
      - sumonix-net
    logging: *common-logging

  # ─── Execution Service ──────────────────────────────────────────────────────
  execution:
    image: ${REGISTRY}/execution:${IMAGE_TAG}
    privileged: true
    environment:
      <<: *common-prod-env
      REDIS_HOST: redis
      REDIS_PORT: "6379"
      REDIS_PASSWORD: ${REDIS_PASSWORD}
      EXECUTION_TIMEOUT_SECONDS: "120"
      SANDBOX_MEMORY_LIMIT: "512m"
    volumes:
      - /var/run/docker.sock:/var/run/docker.sock:ro
    deploy:
      <<: *common-deploy
      replicas: 2
      resources:
        limits:
          cpus: "2.0"
          memory: 2048M
        reservations:
          cpus: "0.5"
          memory: 512M
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8030/health"]
      <<: *common-healthcheck
    depends_on:
      - redis
    networks:
      - sumonix-net
    logging: *common-logging

  # ─── Approval Service ───────────────────────────────────────────────────────
  approval:
    image: ${REGISTRY}/approval:${IMAGE_TAG}
    environment:
      <<: *common-prod-env
      POSTGRES_HOST: postgres
      POSTGRES_PORT: "5432"
      POSTGRES_DB: ${POSTGRES_DB}
      POSTGRES_USER: ${POSTGRES_USER}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
      REDIS_HOST: redis
      REDIS_PORT: "6379"
      REDIS_PASSWORD: ${REDIS_PASSWORD}
    deploy:
      <<: *common-deploy
      replicas: 2
      resources:
        limits:
          cpus: "1.0"
          memory: 1024M
        reservations:
          cpus: "0.25"
          memory: 256M
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8040/health"]
      <<: *common-healthcheck
    <<: *common-security
    depends_on:
      - postgres
      - redis
    networks:
      - sumonix-net
    logging: *common-logging

  # ─── Auth Service ────────────────────────────────────────────────────────────
  auth:
    image: ${REGISTRY}/auth:${IMAGE_TAG}
    environment:
      <<: *common-prod-env
      POSTGRES_HOST: postgres
      POSTGRES_PORT: "5432"
      POSTGRES_DB: ${POSTGRES_DB}
      POSTGRES_USER: ${POSTGRES_USER}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
      JWT_SECRET_KEY: ${JWT_SECRET_KEY}
      JWT_ACCESS_TOKEN_EXPIRE_MINUTES: "15"
      JWT_REFRESH_TOKEN_EXPIRE_DAYS: "7"
      OAUTH_GITHUB_CLIENT_ID: ${OAUTH_GITHUB_CLIENT_ID}
      OAUTH_GITHUB_CLIENT_SECRET: ${OAUTH_GITHUB_CLIENT_SECRET}
    deploy:
      <<: *common-deploy
      replicas: 2
      resources:
        limits:
          cpus: "1.0"
          memory: 1024M
        reservations:
          cpus: "0.25"
          memory: 256M
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8050/health"]
      <<: *common-healthcheck
    <<: *common-security
    depends_on:
      postgres:
        condition: service_healthy
    networks:
      - sumonix-net
    logging: *common-logging

  # ─── Analytics Service ──────────────────────────────────────────────────────
  analytics:
    image: ${REGISTRY}/analytics:${IMAGE_TAG}
    environment:
      <<: *common-prod-env
      POSTGRES_HOST: postgres
      POSTGRES_PORT: "5432"
      POSTGRES_DB: ${POSTGRES_DB}
      POSTGRES_USER: ${POSTGRES_USER}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
      MONGO_HOST: mongodb
      MONGO_PORT: "27017"
      MONGO_USER: ${MONGO_USER}
      MONGO_PASSWORD: ${MONGO_PASSWORD}
    deploy:
      <<: *common-deploy
      replicas: 2
      resources:
        limits:
          cpus: "1.0"
          memory: 1024M
        reservations:
          cpus: "0.25"
          memory: 256M
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8060/health"]
      <<: *common-healthcheck
    <<: *common-security
    depends_on:
      - postgres
      - mongodb
    networks:
      - sumonix-net
    logging: *common-logging

  # ─── Frontend Dashboard ─────────────────────────────────────────────────────
  dashboard:
    image: ${REGISTRY}/dashboard:${IMAGE_TAG}
    ports:
      - target: 80
        published: ${DASHBOARD_PORT:-80}
        protocol: tcp
        mode: host
    deploy:
      <<: *common-deploy
      replicas: 2
      resources:
        limits:
          cpus: "0.5"
          memory: 512M
        reservations:
          cpus: "0.1"
          memory: 64M
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:80/"]
      <<: *common-healthcheck
    security_opt:
      - no-new-privileges:true
    read_only: true
    tmpfs:
      - /tmp:size=50M
      - /var/cache/nginx:size=50M
      - /var/run:size=10M
    networks:
      - sumonix-net
    logging: *common-logging

  # ─── Infrastructure: PostgreSQL ──────────────────────────────────────────────
  postgres:
    image: postgres:16-alpine
    environment:
      POSTGRES_DB: ${POSTGRES_DB}
      POSTGRES_USER: ${POSTGRES_USER}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
      POSTGRES_INITDB_ARGS: "--auth-host=scram-sha-256"
    command: >
      postgres
      -c shared_buffers=1GB
      -c effective_cache_size=3GB
      -c maintenance_work_mem=256MB
      -c work_mem=16MB
      -c max_connections=200
      -c wal_buffers=64MB
      -c checkpoint_completion_target=0.9
      -c random_page_cost=1.1
      -c effective_io_concurrency=200
      -c log_min_duration_statement=1000
      -c log_checkpoints=on
      -c log_connections=on
      -c log_disconnections=on
      -c ssl=on
      -c ssl_cert_file=/var/lib/postgresql/server.crt
      -c ssl_key_file=/var/lib/postgresql/server.key
    deploy:
      resources:
        limits:
          cpus: "4.0"
          memory: 4096M
        reservations:
          cpus: "2.0"
          memory: 2048M
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER} -d ${POSTGRES_DB}"]
      interval: 10s
      timeout: 5s
      retries: 5
    volumes:
      - postgres_data:/var/lib/postgresql/data
    networks:
      - sumonix-net
    logging: *common-logging

  # ─── Infrastructure: MongoDB ─────────────────────────────────────────────────
  mongodb:
    image: mongo:7
    environment:
      MONGO_INITDB_ROOT_USERNAME: ${MONGO_USER}
      MONGO_INITDB_ROOT_PASSWORD: ${MONGO_PASSWORD}
    command: >
      mongod
      --wiredTigerCacheSizeGB 2
      --bind_ip_all
      --auth
      --setParameter authenticationMechanisms=SCRAM-SHA-256
    deploy:
      resources:
        limits:
          cpus: "2.0"
          memory: 4096M
        reservations:
          cpus: "1.0"
          memory: 2048M
    healthcheck:
      test: ["CMD", "mongosh", "--eval", "db.adminCommand('ping')"]
      interval: 10s
      timeout: 5s
      retries: 5
    volumes:
      - mongo_data:/data/db
    networks:
      - sumonix-net
    logging: *common-logging

  # ─── Infrastructure: Redis ──────────────────────────────────────────────────
  redis:
    image: redis:7-alpine
    command: >
      redis-server
      --requirepass ${REDIS_PASSWORD}
      --maxmemory 2gb
      --maxmemory-policy allkeys-lru
      --appendonly yes
      --appendfsync everysec
      --tcp-backlog 511
      --timeout 300
      --tcp-keepalive 60
      --save 900 1
      --save 300 10
      --save 60 10000
    deploy:
      resources:
        limits:
          cpus: "1.0"
          memory: 2560M
        reservations:
          cpus: "0.5"
          memory: 1024M
    healthcheck:
      test: ["CMD", "redis-cli", "-a", "${REDIS_PASSWORD}", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5
    volumes:
      - redis_data:/data
    networks:
      - sumonix-net
    logging: *common-logging

  # ─── Infrastructure: Qdrant ─────────────────────────────────────────────────
  qdrant:
    image: qdrant/qdrant:latest
    deploy:
      resources:
        limits:
          cpus: "2.0"
          memory: 4096M
        reservations:
          cpus: "1.0"
          memory: 2048M
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:6333/healthz"]
      interval: 30s
      timeout: 10s
      retries: 5
    volumes:
      - qdrant_data:/qdrant/storage
    networks:
      - sumonix-net
    logging: *common-logging

  # ─── Monitoring: Prometheus ─────────────────────────────────────────────────
  prometheus:
    image: prom/prometheus:latest
    ports:
      - "${PROMETHEUS_PORT:-9090}:9090"
    deploy:
      resources:
        limits:
          cpus: "1.0"
          memory: 2048M
        reservations:
          cpus: "0.25"
          memory: 512M
    command:
      - "--config.file=/etc/prometheus/prometheus.yml"
      - "--storage.tsdb.path=/prometheus"
      - "--storage.tsdb.retention.time=30d"
      - "--storage.tsdb.retention.size=10GB"
      - "--web.enable-lifecycle"
    volumes:
      - ../kubernetes/configmaps/prometheus.yml:/etc/prometheus/prometheus.yml:ro
      - prometheus_data:/prometheus
    networks:
      - sumonix-net
    logging: *common-logging

  # ─── Monitoring: Grafana ────────────────────────────────────────────────────
  grafana:
    image: grafana/grafana:latest
    ports:
      - "${GRAFANA_PORT:-3001}:3000"
    environment:
      - GF_SECURITY_ADMIN_PASSWORD=${GRAFANA_PASSWORD}
      - GF_USERS_ALLOW_SIGN_UP=false
      - GF_AUTH_ANONYMOUS_ENABLED=false
      - GF_SERVER_ROOT_URL=${GRAFANA_ROOT_URL}
      - GF_LOG_LEVEL=warn
    deploy:
      resources:
        limits:
          cpus: "1.0"
          memory: 1024M
        reservations:
          cpus: "0.25"
          memory: 256M
    volumes:
      - grafana_data:/var/lib/grafana
    depends_on:
      - prometheus
    networks:
      - sumonix-net
    logging: *common-logging

volumes:
  postgres_data:
    driver: local
  mongo_data:
    driver: local
  redis_data:
    driver: local
  qdrant_data:
    driver: local
  prometheus_data:
    driver: local
  grafana_data:
    driver: local

networks:
  sumonix-net:
    driver: bridge
    ipam:
      config:
        - subnet: 172.28.0.0/16
