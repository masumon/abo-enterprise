# =============================================================================
# Aegis AI X - Staging Docker Compose
# =============================================================================
# Usage: docker compose -f infrastructure/docker-compose/staging.yml up -d
#
# Features:
#   - Production-like configuration with fewer replicas
#   - Resource limits (lower than production)
#   - Health checks on all services
#   - Named images from container registry
#   - No debug ports, no volume mounts of source code
# =============================================================================

version: "3.9"

x-common-staging-env: &common-staging-env
  APP_ENV: staging
  LOG_LEVEL: INFO
  PYTHONDONTWRITEBYTECODE: "1"
  PYTHONUNBUFFERED: "1"

x-common-healthcheck: &common-healthcheck
  interval: 30s
  timeout: 10s
  retries: 3
  start_period: 40s

x-common-deploy: &common-deploy
  restart_policy:
    condition: on-failure
    delay: 5s
    max_attempts: 3
    window: 120s

services:
  # ─── API Gateway ─────────────────────────────────────────────────────────────
  api-gateway:
    image: ${REGISTRY:-ghcr.io/aegis-ai-x}/api-gateway:${IMAGE_TAG:-staging}
    ports:
      - "${API_GATEWAY_PORT:-8000}:8000"
    environment:
      <<: *common-staging-env
      POSTGRES_HOST: postgres
      POSTGRES_PORT: "5432"
      POSTGRES_DB: ${POSTGRES_DB}
      POSTGRES_USER: ${POSTGRES_USER}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
      REDIS_HOST: redis
      REDIS_PORT: "6379"
      REDIS_PASSWORD: ${REDIS_PASSWORD}
      JWT_SECRET_KEY: ${JWT_SECRET_KEY}
      CORS_ALLOWED_ORIGINS: ${CORS_ALLOWED_ORIGINS:-https://staging.aegis-ai.example.com}
    deploy:
      <<: *common-deploy
      replicas: 1
      resources:
        limits:
          cpus: "1.0"
          memory: 1024M
        reservations:
          cpus: "0.25"
          memory: 256M
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8000/health"]
      <<: *common-healthcheck
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    networks:
      - aegis-net
    logging:
      driver: json-file
      options:
        max-size: "50m"
        max-file: "5"

  # ─── Supervisor Service ──────────────────────────────────────────────────────
  supervisor:
    image: ${REGISTRY:-ghcr.io/aegis-ai-x}/supervisor:${IMAGE_TAG:-staging}
    environment:
      <<: *common-staging-env
      REDIS_HOST: redis
      REDIS_PORT: "6379"
      REDIS_PASSWORD: ${REDIS_PASSWORD}
      POSTGRES_HOST: postgres
      POSTGRES_PORT: "5432"
      POSTGRES_DB: ${POSTGRES_DB}
      POSTGRES_USER: ${POSTGRES_USER}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
    deploy:
      <<: *common-deploy
      replicas: 1
      resources:
        limits:
          cpus: "0.5"
          memory: 512M
        reservations:
          cpus: "0.15"
          memory: 128M
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8010/health"]
      <<: *common-healthcheck
    depends_on:
      - redis
      - postgres
    networks:
      - aegis-net
    logging:
      driver: json-file
      options:
        max-size: "50m"
        max-file: "5"

  # ─── Agent Service ───────────────────────────────────────────────────────────
  agents:
    image: ${REGISTRY:-ghcr.io/aegis-ai-x}/agents:${IMAGE_TAG:-staging}
    environment:
      <<: *common-staging-env
      OPENAI_API_KEY: ${OPENAI_API_KEY}
      ANTHROPIC_API_KEY: ${ANTHROPIC_API_KEY}
      GOOGLE_AI_API_KEY: ${GOOGLE_AI_API_KEY}
      QDRANT_HOST: qdrant
      QDRANT_PORT: "6333"
      REDIS_HOST: redis
      REDIS_PORT: "6379"
      REDIS_PASSWORD: ${REDIS_PASSWORD}
    deploy:
      <<: *common-deploy
      replicas: 1
      resources:
        limits:
          cpus: "1.0"
          memory: 2048M
        reservations:
          cpus: "0.25"
          memory: 512M
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8020/health"]
      <<: *common-healthcheck
    depends_on:
      - redis
      - qdrant
    networks:
      - aegis-net
    logging:
      driver: json-file
      options:
        max-size: "50m"
        max-file: "5"

  # ─── Execution Service ──────────────────────────────────────────────────────
  execution:
    image: ${REGISTRY:-ghcr.io/aegis-ai-x}/execution:${IMAGE_TAG:-staging}
    privileged: true
    environment:
      <<: *common-staging-env
      REDIS_HOST: redis
      REDIS_PORT: "6379"
      REDIS_PASSWORD: ${REDIS_PASSWORD}
    volumes:
      - /var/run/docker.sock:/var/run/docker.sock:ro
    deploy:
      <<: *common-deploy
      replicas: 1
      resources:
        limits:
          cpus: "1.0"
          memory: 1024M
        reservations:
          cpus: "0.25"
          memory: 256M
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8030/health"]
      <<: *common-healthcheck
    depends_on:
      - redis
    networks:
      - aegis-net
    logging:
      driver: json-file
      options:
        max-size: "50m"
        max-file: "5"

  # ─── Approval Service ───────────────────────────────────────────────────────
  approval:
    image: ${REGISTRY:-ghcr.io/aegis-ai-x}/approval:${IMAGE_TAG:-staging}
    environment:
      <<: *common-staging-env
      POSTGRES_HOST: postgres
      POSTGRES_PORT: "5432"
      POSTGRES_DB: ${POSTGRES_DB}
      POSTGRES_USER: ${POSTGRES_USER}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
      REDIS_HOST: redis
      REDIS_PORT: "6379"
      REDIS_PASSWORD: ${REDIS_PASSWORD}
    deploy:
      <<: *common-deploy
      replicas: 1
      resources:
        limits:
          cpus: "0.5"
          memory: 512M
        reservations:
          cpus: "0.15"
          memory: 128M
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8040/health"]
      <<: *common-healthcheck
    depends_on:
      - postgres
      - redis
    networks:
      - aegis-net
    logging:
      driver: json-file
      options:
        max-size: "50m"
        max-file: "5"

  # ─── Auth Service ────────────────────────────────────────────────────────────
  auth:
    image: ${REGISTRY:-ghcr.io/aegis-ai-x}/auth:${IMAGE_TAG:-staging}
    environment:
      <<: *common-staging-env
      POSTGRES_HOST: postgres
      POSTGRES_PORT: "5432"
      POSTGRES_DB: ${POSTGRES_DB}
      POSTGRES_USER: ${POSTGRES_USER}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
      JWT_SECRET_KEY: ${JWT_SECRET_KEY}
      OAUTH_GITHUB_CLIENT_ID: ${OAUTH_GITHUB_CLIENT_ID}
      OAUTH_GITHUB_CLIENT_SECRET: ${OAUTH_GITHUB_CLIENT_SECRET}
    deploy:
      <<: *common-deploy
      replicas: 1
      resources:
        limits:
          cpus: "0.5"
          memory: 512M
        reservations:
          cpus: "0.15"
          memory: 128M
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8050/health"]
      <<: *common-healthcheck
    depends_on:
      postgres:
        condition: service_healthy
    networks:
      - aegis-net
    logging:
      driver: json-file
      options:
        max-size: "50m"
        max-file: "5"

  # ─── Analytics Service ──────────────────────────────────────────────────────
  analytics:
    image: ${REGISTRY:-ghcr.io/aegis-ai-x}/analytics:${IMAGE_TAG:-staging}
    environment:
      <<: *common-staging-env
      POSTGRES_HOST: postgres
      POSTGRES_PORT: "5432"
      POSTGRES_DB: ${POSTGRES_DB}
      POSTGRES_USER: ${POSTGRES_USER}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
      MONGO_HOST: mongodb
      MONGO_PORT: "27017"
      MONGO_USER: ${MONGO_USER}
      MONGO_PASSWORD: ${MONGO_PASSWORD}
    deploy:
      <<: *common-deploy
      replicas: 1
      resources:
        limits:
          cpus: "0.5"
          memory: 512M
        reservations:
          cpus: "0.15"
          memory: 128M
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8060/health"]
      <<: *common-healthcheck
    depends_on:
      - postgres
      - mongodb
    networks:
      - aegis-net
    logging:
      driver: json-file
      options:
        max-size: "50m"
        max-file: "5"

  # ─── Frontend Dashboard ─────────────────────────────────────────────────────
  dashboard:
    image: ${REGISTRY:-ghcr.io/aegis-ai-x}/dashboard:${IMAGE_TAG:-staging}
    ports:
      - "${DASHBOARD_PORT:-3000}:80"
    deploy:
      <<: *common-deploy
      replicas: 1
      resources:
        limits:
          cpus: "0.25"
          memory: 256M
        reservations:
          cpus: "0.1"
          memory: 64M
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:80/"]
      <<: *common-healthcheck
    networks:
      - aegis-net
    logging:
      driver: json-file
      options:
        max-size: "50m"
        max-file: "5"

  # ─── Infrastructure: PostgreSQL ──────────────────────────────────────────────
  postgres:
    image: postgres:16-alpine
    environment:
      POSTGRES_DB: ${POSTGRES_DB}
      POSTGRES_USER: ${POSTGRES_USER}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
    deploy:
      resources:
        limits:
          cpus: "1.0"
          memory: 1024M
        reservations:
          cpus: "0.5"
          memory: 512M
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER}"]
      interval: 10s
      timeout: 5s
      retries: 5
    volumes:
      - postgres_data:/var/lib/postgresql/data
    networks:
      - aegis-net

  # ─── Infrastructure: MongoDB ─────────────────────────────────────────────────
  mongodb:
    image: mongo:7
    environment:
      MONGO_INITDB_ROOT_USERNAME: ${MONGO_USER}
      MONGO_INITDB_ROOT_PASSWORD: ${MONGO_PASSWORD}
    deploy:
      resources:
        limits:
          cpus: "1.0"
          memory: 1024M
        reservations:
          cpus: "0.25"
          memory: 256M
    healthcheck:
      test: ["CMD", "mongosh", "--eval", "db.adminCommand('ping')"]
      interval: 10s
      timeout: 5s
      retries: 5
    volumes:
      - mongo_data:/data/db
    networks:
      - aegis-net

  # ─── Infrastructure: Redis ──────────────────────────────────────────────────
  redis:
    image: redis:7-alpine
    command: >
      redis-server
      --requirepass ${REDIS_PASSWORD}
      --maxmemory 512mb
      --maxmemory-policy allkeys-lru
      --appendonly yes
    deploy:
      resources:
        limits:
          cpus: "0.5"
          memory: 768M
        reservations:
          cpus: "0.1"
          memory: 128M
    healthcheck:
      test: ["CMD", "redis-cli", "-a", "${REDIS_PASSWORD}", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5
    volumes:
      - redis_data:/data
    networks:
      - aegis-net

  # ─── Infrastructure: Qdrant ─────────────────────────────────────────────────
  qdrant:
    image: qdrant/qdrant:latest
    deploy:
      resources:
        limits:
          cpus: "1.0"
          memory: 2048M
        reservations:
          cpus: "0.25"
          memory: 512M
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:6333/healthz"]
      interval: 30s
      timeout: 10s
      retries: 3
    volumes:
      - qdrant_data:/qdrant/storage
    networks:
      - aegis-net

  # ─── Monitoring: Prometheus ─────────────────────────────────────────────────
  prometheus:
    image: prom/prometheus:latest
    ports:
      - "${PROMETHEUS_PORT:-9090}:9090"
    deploy:
      resources:
        limits:
          cpus: "0.5"
          memory: 512M
        reservations:
          cpus: "0.1"
          memory: 128M
    volumes:
      - ../kubernetes/configmaps/prometheus.yml:/etc/prometheus/prometheus.yml:ro
      - prometheus_data:/prometheus
    networks:
      - aegis-net

  # ─── Monitoring: Grafana ────────────────────────────────────────────────────
  grafana:
    image: grafana/grafana:latest
    ports:
      - "${GRAFANA_PORT:-3001}:3000"
    environment:
      - GF_SECURITY_ADMIN_PASSWORD=${GRAFANA_PASSWORD}
      - GF_USERS_ALLOW_SIGN_UP=false
      - GF_SERVER_ROOT_URL=https://staging-grafana.aegis-ai.example.com
    deploy:
      resources:
        limits:
          cpus: "0.5"
          memory: 512M
        reservations:
          cpus: "0.1"
          memory: 128M
    volumes:
      - grafana_data:/var/lib/grafana
    depends_on:
      - prometheus
    networks:
      - aegis-net

volumes:
  postgres_data:
    driver: local
  mongo_data:
    driver: local
  redis_data:
    driver: local
  qdrant_data:
    driver: local
  prometheus_data:
    driver: local
  grafana_data:
    driver: local

networks:
  aegis-net:
    driver: bridge
