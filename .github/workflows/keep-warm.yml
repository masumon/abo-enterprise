name: Keep backend warm

# The API runs on a free tier that sleeps after ~15 min of inactivity and then
# takes 30–60s to cold-start. On mobile networks that added latency pushed the
# first request past its timeout, so the site "worked on WiFi but not on mobile
# data". Pinging the health endpoint on a schedule keeps the instance awake so
# real visitors — especially on mobile — never hit a cold start.
#
# This lives outside the app code on purpose: future frontend/backend changes
# cannot accidentally reintroduce the cold-start problem.

on:
  schedule:
    # Every 10 minutes (sleep threshold is ~15 min). GitHub may delay scheduled
    # runs under load, but 10 min leaves comfortable margin.
    - cron: "*/10 * * * *"
  workflow_dispatch: {}

# If a previous ping is still running, don't pile up.
concurrency:
  group: keep-warm
  cancel-in-progress: false

jobs:
  ping:
    runs-on: ubuntu-latest
    timeout-minutes: 5
    steps:
      - name: Ping health endpoint (wakes app + warms DB pool)
        env:
          # Override in repo Settings → Variables if the API URL ever changes,
          # so this keeps working without editing the workflow.
          API_URL: ${{ vars.KEEP_WARM_URL || 'https://abo-enterprise.onrender.com' }}
        run: |
          set -euo pipefail
          echo "Pinging ${API_URL} ..."
          # Retry a few times: the very ping that wakes the app may itself hit the
          # cold start. --max-time 90 comfortably covers a full cold boot.
          for attempt in 1 2 3 4 5; do
            code=$(curl -sS -o /dev/null -w "%{http_code}" \
              --max-time 90 --retry 0 \
              "${API_URL}/health/ready" || echo "000")
            echo "Attempt ${attempt}: HTTP ${code}"
            if [ "${code}" = "200" ]; then
              echo "Backend is awake."
              exit 0
            fi
            sleep 15
          done
          # A warm-up ping that never returns 200 is not a CI failure we want to
          # be paged about — the next scheduled run will try again. Also hit the
          # plain /health so the app process is at least awake for real users.
          curl -sS --max-time 90 "${API_URL}/health" || true
          echo "Health did not report ready after retries; leaving for next run."
