name: Deploy

on:
  push:
    branches:
      - main

jobs:
  deploy-backend:
    name: Trigger Render Deploy
    runs-on: ubuntu-latest
    steps:
      - name: Trigger Render deploy hook
        run: |
          curl -s "${{ secrets.RENDER_DEPLOY_HOOK }}" \
            -X POST \
            --fail-with-body
